name: CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npm test

  build-and-push:
    name: Build and push Docker image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tmnt-node-ci:latest
            ghcr.io/${{ github.repository_owner }}/tmnt-node-ci:${{ github.sha }}

  deploy:
    name: Deploy to remote host
    needs: build-and-push
    runs-on: self-hosted
    if: github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy locally (Linux/macOS runners)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          docker version
          if command -v docker-compose >/dev/null 2>&1; then
            DC="docker-compose"
          else
            DC="docker compose"
          fi
          $DC down --remove-orphans || true
          $DC pull || true
          $DC up -d --build --remove-orphans

      - name: Deploy locally (Windows runner)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          docker version
          if (Get-Command docker-compose -ErrorAction SilentlyContinue) {
            $DC = 'docker-compose'
          } else {
            $DC = 'docker compose'
          }
          & $DC down --remove-orphans || Write-Host 'down failed'
          & $DC pull || Write-Host 'pull failed'
          & $DC up -d --build --remove-orphans
